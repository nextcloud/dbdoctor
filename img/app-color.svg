<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
	<!-- Colour variant of the "patient monitor" mark for the app
		 store: bedside monitor with a heartbeat trace on the branded disc. -->
	<defs>
		<radialGradient id="dbd-bg" cx="50%" cy="40%" r="60%">
			<stop offset="0%" stop-color="#cfe9ff"/>
			<stop offset="100%" stop-color="#0082c9"/>
		</radialGradient>
	</defs>

	<circle cx="48" cy="48" r="44" fill="url(#dbd-bg)"/>

	<g transform="translate(9.6 8) scale(3.2)" fill="none" stroke="#003b66" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
		<!-- Monitor screen + stand -->
		<rect x="3.5" y="5" width="17" height="12" rx="2" fill="#e6f3fc"/>
		<path d="M9.5 20.5h5M12 17v3.5"/>
		<!-- Heartbeat trace -->
		<polyline points="6.5 11 8.3 11 9.6 8.6 11.6 13.6 13 10.2 13.9 11 17.5 11" stroke="#e9322d" stroke-width="1.6"/>
	</g>
</svg>
