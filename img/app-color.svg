<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
	<!-- Colour variant of the "temperature taken" mark for the app
		 store: database cylinder + thermometer on the branded disc. -->
	<defs>
		<radialGradient id="dbd-bg" cx="50%" cy="40%" r="60%">
			<stop offset="0%" stop-color="#cfe9ff"/>
			<stop offset="100%" stop-color="#0082c9"/>
		</radialGradient>
	</defs>

	<circle cx="48" cy="48" r="44" fill="url(#dbd-bg)"/>

	<g transform="translate(12 11) scale(3.2)" fill="none" stroke="#003b66" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
		<!-- Database cylinder -->
		<path d="M4.5 6.8V17c0 1.16 2.24 2.1 5 2.1s5-.94 5-2.1V6.8" fill="#e6f3fc"/>
		<ellipse cx="9.5" cy="6.8" rx="5" ry="2.1" fill="#cfe9ff"/>
		<!-- Thermometer -->
		<path d="M18.2 13.4V4.6a1.6 1.6 0 0 1 3.2 0v8.8a3.1 3.1 0 1 1-3.2 0z" fill="#ffffff"/>
		<path d="M19.8 8.5v5" stroke="#e9322d" stroke-width="1.4"/>
		<circle cx="19.8" cy="16.1" r="1.4" fill="#e9322d" stroke="none"/>
	</g>
</svg>
